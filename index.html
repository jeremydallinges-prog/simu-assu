<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyseur Assurance Emprunteur — Jérémy Dallinges</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A3C34;
    --navy-mid: #245C4F;
    --gold: #3DB984;
    --gold-light: #6DCFAA;
    --cream: #F4FAF7;
    --cream-dark: #E0F0E9;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--cream); 
    color: var(--text); 
    min-height: 100vh; 
    line-height: 1.6;
  }

  /* HEADER & BRANDING */
  .brand-header {
    padding: 20px;
    display: flex;
    justify-content: center;
    background: var(--white);
  }
  .main-logo { height: 45px; width: auto; }

  /* HERO SECTION */
  .hero { 
    background: var(--navy); 
    padding: 60px 24px 100px; 
    text-align: center; 
    color: var(--white);
    position: relative;
  }
  .profile-container {
    margin-bottom: 20px;
  }
  /* Photo agrandie selon souhait (+1cm environ) */
  .profile-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    object-fit: cover;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .hero h1 { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(26px, 5vw, 38px); 
    margin-bottom: 15px; 
    line-height: 1.1;
  }
  .hero h1 span { color: var(--gold); }
  .hero p { 
    font-size: 17px; 
    opacity: 0.8; 
    max-width: 550px; 
    margin: 0 auto; 
    font-weight: 300; 
  }

  /* MAIN CARD */
  .container { max-width: 650px; margin: -60px auto 50px; padding: 0 20px; }
  .card { 
    background: var(--white); 
    border-radius: 24px; 
    box-shadow: 0 20px 40px rgba(26,60,52,0.1); 
    padding: 40px 30px; 
  }

  /* CALCULATEUR INTERACTIF */
  .calculator { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed var(--cream-dark); }
  .calc-title { font-weight: 600; color: var(--navy); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 18px; }
  .slider-group { margin-bottom: 25px; }
  .slider-label { display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .slider-label span:last-child { color: var(--gold); font-weight: 700; font-size: 16px; }
  input[type=range] { width: 100%; accent-color: var(--gold); cursor: pointer; height: 6px; border-radius: 5px; }

  /* DROPZONE & FORM */
  #form-area { animation: fadeIn 0.5s ease; }
  .dropzone { 
    border: 2px dashed var(--gold); 
    border-radius: 20px; 
    padding: 40px 20px; 
    text-align: center; 
    transition: all 0.3s ease; 
    cursor: pointer; 
    background: var(--cream); 
  }
  .dropzone:hover { border-color: var(--navy); background: var(--white); }
  .dropzone-icon { font-size: 40px; margin-bottom: 10px; display: block; }

  /* RGPD */
  .rgpd-box { 
    margin: 20px 0; 
    font-size: 12px; 
    color: var(--text-muted); 
    display: flex; 
    gap: 12px; 
    align-items: flex-start; 
    text-align: left;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 12px;
  }
  .rgpd-box input { margin-top: 4px; width: 18px; height: 18px; accent-color: var(--navy); }

  /* RESULTS */
  .results { display: none; text-align: center; animation: fadeIn 0.6s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .result-box { 
    background: var(--navy); 
    color: var(--white); 
    border-radius: 18px; 
    padding: 30px; 
    text-align: center; 
    margin-bottom: 20px; 
  }
  .result-box .label { font-size: 13px; text-transform: uppercase; color: var(--gold); letter-spacing: 2px; font-weight: 600; }
  .result-box .value { font-family: 'Playfair Display', serif; font-size: 44px; margin: 10px 0; color: var(--gold); }

  /* BUTTONS */
  .cta-btn { 
    display: flex; align-items: center; justify-content: center; gap: 12px; 
    width: 100%; padding: 20px; border-radius: 14px; font-weight: 600; 
    font-size: 16px; text-decoration: none; border: none; cursor: pointer; transition: 0.3s;
  }
  .btn-whatsapp { background: #25D366; color: white; }
  .cta-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

  /* FOOTER */
  .footer { 
    text-align: center; margin-top: 40px; padding-bottom: 40px;
    font-size: 12px; color: var(--text-muted); line-height: 1.8;
  }
